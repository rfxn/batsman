#
# Called from project workflows via workflow_call.
# Performs two-phase Docker build: base image from batsman
# (with GHA cache via docker-container driver), then project
# image layered on top via plain docker build (sees the loaded
# base image in the Docker daemon).

name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      project-name:
        type: string
        required: true
        description: 'Project name for image tags and container naming'
      os-matrix:
        type: string
        required: true
        description: 'JSON array of OS targets, e.g. ["debian12","rocky9"]'
      docker-run-flags:
        type: string
        required: false
        default: ''
        description: 'Extra docker run flags (e.g., --privileged)'
      timeout:
        type: number
        required: false
        default: 15
        description: 'Job timeout in minutes'
      dockerfile-dir:
        type: string
        required: false
        default: 'tests'
        description: 'Directory containing project Dockerfiles'
      concurrency-group:
        type: string
        required: false
        default: ''
        description: 'Concurrency group prefix (empty = default per-project grouping)'
      test-path:
        type: string
        required: false
        default: '/opt/tests'
        description: 'Test directory path inside container'
      parallel-jobs:
        type: number
        required: false
        default: 0
        description: 'BATS parallel jobs via --jobs N (0 = serial, >0 = parallel file execution)'
      reports:
        type: boolean
        required: false
        default: true
        description: 'Generate JUnit XML reports and upload as artifacts'
      file-groups:
        type: number
        required: false
        default: 1
        description: 'Split test files into N groups, each running in a separate matrix job (default 1 = all files in one job)'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - name: Checkout (file-group discovery)
        if: inputs.file-groups > 1
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate test matrix
        id: matrix
        run: |
          if [ "${{ inputs.file-groups }}" -le 1 ]; then
            echo "result={\"os\":${{ inputs.os-matrix }}}" >> "$GITHUB_OUTPUT"
          else
            RESULT=$(bash "${{ inputs.dockerfile-dir }}/infra/scripts/file-groups.sh" \
              "${{ inputs.dockerfile-dir }}" \
              "${{ inputs.file-groups }}" \
              "${{ inputs.test-path }}" \
              '${{ inputs.os-matrix }}')
            echo "result=${RESULT}" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}

    concurrency:
      group: ${{ inputs.concurrency-group != '' && format('{0}-{1}{2}', inputs.concurrency-group, matrix.os, matrix.group && format('-g{0}', matrix.group) || '') || format('{0}-{1}-{2}{3}', inputs.project-name, github.ref, matrix.os, matrix.group && format('-g{0}', matrix.group) || '') }}
      cancel-in-progress: true

    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image (${{ matrix.os }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.dockerfile-dir }}/infra
          file: ${{ inputs.dockerfile-dir }}/infra/dockerfiles/Dockerfile.${{ matrix.os }}
          tags: ${{ inputs.project-name }}-base-${{ matrix.os }}
          load: true
          cache-from: type=gha,scope=base-${{ matrix.os }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.os }}

      - name: Build project image (${{ matrix.os }})
        run: |
          if [ "${{ matrix.os }}" = "debian12" ]; then
            DOCKERFILE="${{ inputs.dockerfile-dir }}/Dockerfile"
          else
            DOCKERFILE="${{ inputs.dockerfile-dir }}/Dockerfile.${{ matrix.os }}"
          fi
          docker build \
            --build-arg "BASE_IMAGE=${{ inputs.project-name }}-base-${{ matrix.os }}" \
            -f "$DOCKERFILE" \
            -t "${{ inputs.project-name }}-test-${{ matrix.os }}" \
            .

      - name: Run tests (${{ matrix.os }}${{ matrix.group && format(' g{0}', matrix.group) || '' }})
        run: |
          REPORT_FLAGS=""
          REPORT_MOUNT=""
          JOBS_FLAG=""
          if [ "${{ inputs.reports }}" = "true" ]; then
            mkdir -p "${{ runner.temp }}/reports"
            REPORT_FLAGS="--report-formatter junit --output /reports"
            REPORT_MOUNT="-v ${{ runner.temp }}/reports:/reports"
          fi
          if [ "${{ inputs.parallel-jobs }}" -gt 0 ]; then
            # Verify both GNU parallel and BATS --jobs work on this image.
            # Deep-legacy bash (4.1/4.2 on centos6/ubuntu1204) can silently
            # fail parallel mode — "Executed 0 instead of expected N tests".
            SMOKE=$(docker run --rm ${{ inputs.project-name }}-test-${{ matrix.os }} \
              bash -c 'command -v parallel >/dev/null 2>&1 || exit 1; \
                       printf "@test \"s\" { true; }\n" > /tmp/_p.bats; \
                       bats --jobs 1 --formatter tap /tmp/_p.bats 2>&1' \
            ) && SMOKE_RC=$? || SMOKE_RC=$?
            if [ "$SMOKE_RC" -eq 0 ] && echo "$SMOKE" | grep -q "^ok 1"; then
              JOBS_FLAG="--jobs ${{ inputs.parallel-jobs }}"
            else
              echo "::warning::BATS --jobs not functional on ${{ matrix.os }} — running tests serially"
            fi
          fi
          TEST_TARGET="${{ matrix.files || inputs.test-path }}"
          docker run --rm \
            ${{ inputs.docker-run-flags }} \
            $REPORT_MOUNT \
            ${{ inputs.project-name }}-test-${{ matrix.os }} \
            bats --formatter tap \
            $JOBS_FLAG \
            $REPORT_FLAGS \
            $TEST_TARGET

      - name: Upload test reports
        if: inputs.reports && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ inputs.project-name }}-${{ matrix.os }}${{ matrix.group && format('-g{0}', matrix.group) || '' }}
          path: ${{ runner.temp }}/reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Test summary
        if: inputs.reports && always()
        run: |
          REPORT_FILE="${{ runner.temp }}/reports/report.xml"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No JUnit report found — skipping summary" >&2
            exit 0
          fi
          tests=$(grep -o 'tests="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          failures=$(grep -o 'failures="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          errors=$(grep -o 'errors="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          skipped=$(grep -o 'skipped="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          time=$(grep -o 'time="[0-9.]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9.]*' || echo "?")
          GROUP_LABEL="${{ matrix.group && format(' (group {0})', matrix.group) || '' }}"
          echo "## Test Results: ${{ matrix.os }}${GROUP_LABEL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${tests:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failures | ${failures:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Errors | ${errors:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skipped | ${skipped:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Duration | ${time:-?}s |" >> "$GITHUB_STEP_SUMMARY"
