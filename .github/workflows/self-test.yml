# Runs batsman's own test suite. Cannot use the reusable test.yml
# because that expects infra at tests/infra/ (submodule layout),
# but for self-tests the infra IS the repo root.

name: Self-Tests

on:
  push:
    branches: [master, '[0-9]*.*']
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: |
          bash -n lib/run-tests-core.sh
          bash -n scripts/install-bats.sh
          bash -n tests/run-tests.sh
          bash -n tests/helpers/batsman-common.bash

      - name: Shellcheck
        run: |
          shellcheck lib/run-tests-core.sh scripts/install-bats.sh
          shellcheck tests/run-tests.sh tests/helpers/batsman-common.bash

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: batsman-self-test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/Dockerfile.debian12
          tags: batsman-base-debian12
          load: true
          cache-from: type=gha,scope=base-debian12
          cache-to: type=gha,mode=max,scope=base-debian12

      - name: Build test image
        run: |
          docker build \
            --build-arg "BASE_IMAGE=batsman-base-debian12" \
            -f tests/Dockerfile \
            -t batsman-test-debian12 \
            .

      - name: Run tests
        run: |
          mkdir -p "${{ runner.temp }}/reports"
          docker run --rm \
            -v "${{ runner.temp }}/reports:/reports" \
            batsman-test-debian12 \
            bats --formatter tap \
            --jobs 2 \
            --report-formatter junit --output /reports \
            /opt/tests/

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-batsman-debian12
          path: ${{ runner.temp }}/reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Test summary
        if: always()
        run: |
          REPORT_FILE="${{ runner.temp }}/reports/report.xml"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No JUnit report found — skipping summary" >&2
            exit 0
          fi
          tests=$(grep -o 'tests="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          failures=$(grep -o 'failures="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          errors=$(grep -o 'errors="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          skipped=$(grep -o 'skipped="[0-9]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9]*' || echo "0")
          time=$(grep -o 'time="[0-9.]*"' "$REPORT_FILE" | head -1 | grep -o '[0-9.]*' || echo "?")
          echo "## Test Results: debian12" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${tests:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failures | ${failures:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Errors | ${errors:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skipped | ${skipped:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Duration | ${time:-?}s |" >> "$GITHUB_STEP_SUMMARY"
